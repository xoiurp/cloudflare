<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Cirurgião Stream Videos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #08090c;
            --surface: rgba(255,255,255,0.035);
            --surface-hover: rgba(255,255,255,0.06);
            --surface-solid: #131318;
            --surface-raised: #1a1a22;
            --glass: rgba(255,255,255,0.04);
            --glass-border: rgba(255,255,255,0.07);
            --border: rgba(255,255,255,0.06);
            --text: #f0ede8;
            --text-secondary: rgba(255,255,255,0.55);
            --text-dim: rgba(255,255,255,0.3);
            --amber: #e8a952;
            --amber-glow: rgba(232,169,82,0.15);
            --amber-soft: #d4994a;
            --green: #5ddb8a;
            --green-bg: rgba(93,219,138,0.1);
            --red: #e85c5c;
            --red-bg: rgba(232,92,92,0.1);
            --blue: #6ba3e8;
            --blue-bg: rgba(107,163,232,0.1);
            --purple: #9b7ae8;
            --purple-bg: rgba(155,122,232,0.1);
            --radius: 14px;
            --radius-sm: 8px;
            --radius-xs: 6px;
        }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.02;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        .ambient-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.06;
            pointer-events: none;
            z-index: 0;
        }
        .glow-1 { top: -200px; left: -100px; background: var(--amber); }
        .glow-2 { bottom: -300px; right: -200px; background: #6b5ce8; opacity: 0.04; }

        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 20px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(24px) saturate(1.2);
            -webkit-backdrop-filter: blur(24px) saturate(1.2);
            background: rgba(8,9,12,0.75);
        }

        .header-left { display: flex; align-items: center; gap: 14px; }

        .logo {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--amber), #c47e30);
            border-radius: 11px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            box-shadow: 0 4px 16px var(--amber-glow);
        }

        .brand-title {
            font-family: 'Outfit', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--text) 0%, var(--amber) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .brand-sub { font-size: 10px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; font-weight: 500; margin-top: -1px; }

        .stats-bar { display: flex; gap: 6px; flex-wrap: wrap; }

        .stat {
            background: var(--glass); border: 1px solid var(--glass-border); border-radius: var(--radius-sm);
            padding: 8px 16px; text-align: center; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .stat:hover { border-color: rgba(232,169,82,0.2); background: var(--amber-glow); }

        .stat-value { font-family: 'Outfit', sans-serif; font-size: 18px; font-weight: 700; color: var(--amber); line-height: 1.2; }
        .stat-label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 500; margin-top: 1px; }

        .toolbar {
            position: sticky; top: 73px; z-index: 99; padding: 14px 32px;
            display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
            backdrop-filter: blur(20px) saturate(1.2); -webkit-backdrop-filter: blur(20px) saturate(1.2);
            background: rgba(8,9,12,0.65); border-bottom: 1px solid var(--border);
        }

        .search-box { flex: 1; min-width: 200px; max-width: 380px; position: relative; }
        .search-box input {
            width: 100%; padding: 10px 14px 10px 40px; background: var(--glass);
            border: 1px solid var(--glass-border); border-radius: var(--radius);
            color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; transition: all 0.3s;
        }
        .search-box input::placeholder { color: var(--text-dim); }
        .search-box input:focus { border-color: var(--amber-soft); box-shadow: 0 0 0 3px var(--amber-glow); }
        .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--text-dim); }
        .search-count { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); font-size: 11px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; font-weight: 500; pointer-events: none; }

        .filter-group { display: flex; gap: 6px; flex-wrap: wrap; }

        .chip {
            padding: 8px 14px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px;
            color: var(--text-secondary); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
            cursor: pointer; transition: all 0.25s; user-select: none; display: inline-flex; align-items: center; gap: 5px;
        }
        .chip:hover { background: var(--surface-hover); color: var(--text); border-color: rgba(255,255,255,0.12); }
        .chip.active { background: var(--amber-glow); color: var(--amber); border-color: rgba(232,169,82,0.3); }
        .chip .count { background: rgba(255,255,255,0.08); padding: 1px 7px; border-radius: 10px; font-size: 10px; font-family: 'JetBrains Mono', monospace; }
        .chip.active .count { background: rgba(232,169,82,0.2); }

        .select-wrap { position: relative; }
        .select-wrap select {
            appearance: none; padding: 10px 32px 10px 12px; background: var(--glass);
            border: 1px solid var(--glass-border); border-radius: var(--radius); color: var(--text);
            font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; outline: none; transition: all 0.3s;
        }
        .select-wrap select:hover { border-color: rgba(255,255,255,0.12); }
        .select-wrap::after { content: '\25BE'; position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 11px; pointer-events: none; }

        .toolbar-right { display: flex; gap: 6px; margin-left: auto; align-items: center; }

        .view-toggle { display: flex; background: var(--glass); border-radius: var(--radius); border: 1px solid var(--glass-border); overflow: hidden; }
        .view-toggle button { padding: 9px 12px; background: transparent; border: none; color: var(--text-dim); cursor: pointer; font-size: 14px; transition: all 0.25s; line-height: 1; }
        .view-toggle button.active { background: var(--amber); color: #000; }
        .view-toggle button:not(.active):hover { color: var(--text); }

        .btn {
            padding: 10px 16px; border: none; border-radius: var(--radius); font-family: 'DM Sans', sans-serif;
            font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex; align-items: center; gap: 5px; line-height: 1; white-space: nowrap;
        }
        .btn-primary { background: linear-gradient(135deg, var(--amber), #c47e30); color: #000; box-shadow: 0 2px 12px var(--amber-glow); }
        .btn-primary:hover { box-shadow: 0 4px 24px rgba(232,169,82,0.3); transform: translateY(-1px); }
        .btn-ghost { background: var(--glass); color: var(--text-secondary); border: 1px solid var(--glass-border); }
        .btn-ghost:hover { background: var(--surface-hover); color: var(--text); border-color: rgba(255,255,255,0.12); }
        .btn-sm { padding: 6px 10px; font-size: 11px; border-radius: var(--radius-xs); }

        .btn-icon {
            padding: 6px; background: transparent; border: none; color: var(--text-dim); cursor: pointer;
            border-radius: var(--radius-xs); transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center;
        }
        .btn-icon:hover { background: var(--surface-hover); color: var(--text); }
        .btn-icon svg { width: 14px; height: 14px; }

        .container { position: relative; z-index: 5; padding: 20px 32px 60px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }

        .card {
            background: var(--surface); border-radius: var(--radius); overflow: hidden;
            border: 1px solid var(--border); transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1); position: relative;
        }
        .card:hover {
            border-color: rgba(232,169,82,0.2); transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.35), 0 0 0 1px rgba(232,169,82,0.08);
        }

        .card-visual {
            position: relative; aspect-ratio: 16/9; overflow: hidden; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #0f1016 0%, #1a1520 50%, #0f1016 100%);
        }

        .card-visual-icon {
            width: 56px; height: 56px; border-radius: 50%;
            background: rgba(232,169,82,0.12);
            display: flex; align-items: center; justify-content: center; transition: all 0.3s;
        }
        .card:hover .card-visual-icon { background: rgba(232,169,82,0.9); box-shadow: 0 6px 24px rgba(232,169,82,0.3); transform: scale(1.1); }
        .card-visual-icon svg { width: 22px; height: 22px; fill: var(--amber); margin-left: 2px; transition: fill 0.3s; }
        .card:hover .card-visual-icon svg { fill: #000; }

        .card-quality-badges { position: absolute; top: 8px; right: 8px; display: flex; gap: 4px; z-index: 2; }
        .q-badge { font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 9px; letter-spacing: 0.8px; padding: 2px 8px; border-radius: var(--radius-xs); text-transform: uppercase; }
        .q-badge-2160p { background: linear-gradient(135deg, var(--amber), #c47e30); color: #000; }
        .q-badge-1080p { background: var(--blue-bg); color: var(--blue); border: 1px solid rgba(107,163,232,0.2); }
        .q-badge-720p { background: var(--glass); color: var(--text-dim); border: 1px solid var(--glass-border); }

        .card-course-tag {
            position: absolute; bottom: 8px; left: 8px; z-index: 2; font-size: 10px; font-weight: 500;
            color: var(--text-secondary); background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
            padding: 3px 10px; border-radius: var(--radius-xs);
            max-width: calc(100% - 16px); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }

        .card-body { padding: 12px 14px; }
        .card-title { font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600; line-height: 1.35; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; letter-spacing: -0.2px; }
        .card-path { font-size: 11px; color: var(--text-dim); margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .card-path span { color: rgba(255,255,255,0.12); margin: 0 4px; }

        .card-actions { display: flex; gap: 4px; padding-top: 8px; border-top: 1px solid var(--border); }
        .card-actions .btn-icon {
            flex: 1; padding: 6px; font-size: 10px; font-family: 'JetBrains Mono', monospace;
            color: var(--text-dim); display: flex; align-items: center; justify-content: center; gap: 4px;
            border-radius: var(--radius-xs); transition: all 0.2s; cursor: pointer; background: transparent; border: none;
        }
        .card-actions .btn-icon:hover { background: var(--surface-hover); color: var(--amber); }
        .card-actions .btn-icon.copied { color: var(--green) !important; }

        .list-wrapper { display: none; }
        .list-wrapper.active { display: block; }
        .grid.active { display: grid; }

        .list-table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
        .list-table th {
            text-align: left; padding: 12px 14px; font-family: 'Outfit', sans-serif; font-size: 9px;
            text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-dim); border-bottom: 1px solid var(--border);
            font-weight: 600; position: sticky; top: 125px; background: var(--surface-solid); z-index: 10;
        }
        .list-table td { padding: 10px 14px; font-size: 12px; border-bottom: 1px solid rgba(255,255,255,0.03); vertical-align: middle; }
        .list-table tbody tr { transition: background 0.15s; }
        .list-table tbody tr:hover td { background: var(--surface-hover); }

        .name-cell { font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 13px; cursor: pointer; color: var(--text); transition: color 0.2s; max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; }
        .name-cell:hover { color: var(--amber); }
        .list-actions { display: flex; flex-wrap: wrap; gap: 3px; }

        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); z-index: 1000;
            align-items: center; justify-content: center; padding: 20px; animation: fadeIn 0.2s ease;
        }
        .modal-overlay.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .modal {
            background: var(--surface-solid); border-radius: 18px; width: 100%; max-width: 960px;
            max-height: 90vh; overflow-y: auto; border: 1px solid var(--glass-border);
            box-shadow: 0 32px 64px rgba(0,0,0,0.6); animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(16px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }

        .modal-header {
            display: flex; align-items: center; justify-content: space-between; padding: 16px 22px;
            border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface-solid); z-index: 5;
        }
        .modal-header h3 { font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: 600; letter-spacing: -0.3px; max-width: calc(100% - 50px); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .modal-close {
            width: 32px; height: 32px; background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm); color: var(--text-secondary); font-size: 16px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0;
        }
        .modal-close:hover { background: var(--surface-hover); color: var(--text); }

        .modal-player { aspect-ratio: 16/9; background: #000; }
        .modal-player video { width: 100%; height: 100%; background: #000; }

        .quality-selector { display: flex; gap: 6px; padding: 14px 22px; border-bottom: 1px solid var(--border); align-items: center; }
        .quality-selector .qs-label { font-family: 'Outfit', sans-serif; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-dim); margin-right: 6px; }
        .quality-btn {
            padding: 6px 16px; border: 1px solid var(--glass-border); border-radius: 20px; background: var(--glass);
            color: var(--text-secondary); font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.25s;
        }
        .quality-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
        .quality-btn.active { background: var(--amber-glow); color: var(--amber); border-color: rgba(232,169,82,0.3); }
        .quality-btn.q-2160p.active { background: linear-gradient(135deg, var(--amber), #c47e30); color: #000; }

        .modal-grid { padding: 16px 22px; display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 8px; }

        .detail-item { background: var(--glass); border: 1px solid var(--glass-border); padding: 10px 14px; border-radius: var(--radius-sm); cursor: pointer; transition: all 0.2s; }
        .detail-item:hover { border-color: rgba(232,169,82,0.2); background: var(--amber-glow); }
        .detail-label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.2px; font-weight: 500; }
        .detail-value { font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600; margin-top: 2px; word-break: break-all; }

        .modal-section-title { padding: 12px 22px 6px; font-family: 'Outfit', sans-serif; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-dim); }

        .modal-urls { padding: 0 22px 16px; display: flex; flex-direction: column; gap: 6px; }
        .url-row { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: var(--radius-sm); transition: all 0.2s; }
        .url-row:hover { border-color: rgba(255,255,255,0.12); }
        .url-label { font-family: 'Outfit', sans-serif; font-size: 11px; font-weight: 600; color: var(--text-secondary); min-width: 60px; text-transform: uppercase; letter-spacing: 0.5px; }
        .url-value { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
        .url-row .btn-sm { flex-shrink: 0; }

        .load-sentinel { height: 1px; width: 100%; }
        .loading-more { display: flex; align-items: center; justify-content: center; padding: 32px; gap: 12px; }
        .loading-more .spinner-sm { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.06); border-top-color: var(--amber); border-radius: 50%; animation: spin 0.7s linear infinite; }
        .loading-more span { font-size: 12px; color: var(--text-dim); }

        .skeleton-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
        .skeleton-card { background: var(--surface); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
        .skeleton-thumb { aspect-ratio: 16/9; background: linear-gradient(110deg, rgba(255,255,255,0.03) 8%, rgba(255,255,255,0.06) 18%, rgba(255,255,255,0.03) 33%); background-size: 200% 100%; animation: shimmer 1.5s linear infinite; }
        .skeleton-body { padding: 12px 14px; }
        .skeleton-line { height: 12px; border-radius: 6px; background: linear-gradient(110deg, rgba(255,255,255,0.04) 8%, rgba(255,255,255,0.07) 18%, rgba(255,255,255,0.04) 33%); background-size: 200% 100%; animation: shimmer 1.5s linear infinite; margin-bottom: 8px; }
        .skeleton-line:last-child { width: 60%; margin-bottom: 0; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .error-state { display: flex; align-items: center; justify-content: center; padding: 80px 20px; flex-direction: column; gap: 16px; }
        .error-state span { color: var(--text-dim); font-size: 13px; }

        .spinner { width: 36px; height: 36px; border: 2.5px solid rgba(255,255,255,0.06); border-top-color: var(--amber); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .empty-state { text-align: center; padding: 80px 20px; color: var(--text-dim); font-size: 14px; }
        .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; display: block; }

        .progress-bar { position: fixed; top: 0; left: 0; height: 2px; background: linear-gradient(90deg, var(--amber), #c47e30); z-index: 9998; transition: width 0.3s ease; box-shadow: 0 0 10px var(--amber-glow); }

        .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface-solid); border: 1px solid var(--glass-border); color: var(--text); padding: 10px 18px; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; transform: translateY(60px); opacity: 0; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 2000; box-shadow: 0 8px 24px rgba(0,0,0,0.4); display: flex; align-items: center; gap: 8px; }
        .toast.show { transform: translateY(0); opacity: 1; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.07); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.14); }

        @media (max-width: 768px) {
            .header { padding: 16px; }
            .toolbar { padding: 12px 16px; top: 65px; }
            .container { padding: 16px 16px 40px; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
            .stat { padding: 6px 10px; }
            .stat-value { font-size: 15px; }
            .brand-title { font-size: 18px; }
            .filter-group { display: none; }
            .modal { border-radius: 14px; }
            .list-table th { top: 110px; }
        }

        @media (max-width: 480px) {
            .header { flex-direction: column; align-items: flex-start; }
            .stats-bar { width: 100%; }
            .stat { flex: 1; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="progress-bar" id="progressBar" style="width:0;display:none"></div>
<div class="ambient-glow glow-1"></div>
<div class="ambient-glow glow-2"></div>

<header class="header">
    <div class="header-left">
        <div class="logo">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </div>
        <div>
            <div class="brand-title">Projeto Cirurgião</div>
            <div class="brand-sub">Stream Videos</div>
        </div>
    </div>
    <div class="stats-bar" id="statsBar">
        <div class="stat"><div class="stat-value" id="totalVideos">--</div><div class="stat-label">Videos</div></div>
        <div class="stat"><div class="stat-value" id="totalCourses">--</div><div class="stat-label">Cursos</div></div>
        <div class="stat"><div class="stat-value" id="total4K">--</div><div class="stat-label">4K</div></div>
        <div class="stat"><div class="stat-value" id="total1080">--</div><div class="stat-label">1080p</div></div>
    </div>
</header>

<div class="toolbar">
    <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Buscar por nome, curso, módulo...">
        <span class="search-count" id="searchCount"></span>
    </div>

    <div class="filter-group" id="filterChips">
        <button class="chip active" data-filter="all">Todos <span class="count" id="countAll">0</span></button>
        <button class="chip" data-filter="4k">4K <span class="count" id="count4K">0</span></button>
        <button class="chip" data-filter="1080p">1080p <span class="count" id="count1080">0</span></button>
        <button class="chip" data-filter="720p">720p <span class="count" id="count720">0</span></button>
    </div>

    <div class="select-wrap">
        <select id="sortSelect">
            <option value="name-asc">Nome A-Z</option>
            <option value="name-desc">Nome Z-A</option>
            <option value="course-asc">Curso A-Z</option>
            <option value="course-desc">Curso Z-A</option>
        </select>
    </div>

    <div class="toolbar-right">
        <div class="view-toggle">
            <button id="gridViewBtn" class="active" onclick="setView('grid')" title="Grade">&#8862;</button>
            <button id="listViewBtn" onclick="setView('list')" title="Lista">&#9776;</button>
        </div>
        <button class="btn btn-primary" onclick="fetchVideos()">&#8635; Atualizar</button>
    </div>
</div>

<div class="container">
    <div class="skeleton-grid" id="skeletonLoader">
        <div class="skeleton-card"><div class="skeleton-thumb"></div><div class="skeleton-body"><div class="skeleton-line"></div><div class="skeleton-line"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-thumb"></div><div class="skeleton-body"><div class="skeleton-line"></div><div class="skeleton-line"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-thumb"></div><div class="skeleton-body"><div class="skeleton-line"></div><div class="skeleton-line"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-thumb"></div><div class="skeleton-body"><div class="skeleton-line"></div><div class="skeleton-line"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-thumb"></div><div class="skeleton-body"><div class="skeleton-line"></div><div class="skeleton-line"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-thumb"></div><div class="skeleton-body"><div class="skeleton-line"></div><div class="skeleton-line"></div></div></div>
    </div>

    <div class="error-state" id="errorState" style="display:none">
        <span style="font-size:40px">&#9888;</span>
        <span id="errorMsg">Erro ao carregar videos</span>
        <button class="btn btn-primary" onclick="fetchVideos()">Tentar novamente</button>
    </div>

    <div class="grid active" id="gridView"></div>

    <div class="list-wrapper" id="listView">
        <table class="list-table">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Curso</th>
                    <th>Módulo</th>
                    <th>Categoria</th>
                    <th>Qualidades</th>
                    <th style="width:180px">Ações</th>
                </tr>
            </thead>
            <tbody id="listBody"></tbody>
        </table>
    </div>

    <div class="empty-state" id="emptyState" style="display:none">
        <span class="empty-icon">&#128269;</span>
        Nenhum video encontrado com esses filtros.
    </div>

    <div class="load-sentinel" id="loadSentinel"></div>
    <div class="loading-more" id="loadingMore" style="display:none">
        <div class="spinner-sm"></div>
        <span>Carregando mais videos...</span>
    </div>
</div>

<!-- Player Modal -->
<div class="modal-overlay" id="playerModal">
    <div class="modal">
        <div class="modal-header">
            <h3 id="modalTitle">Video</h3>
            <button class="modal-close" onclick="closeModal()">&#10005;</button>
        </div>
        <div class="modal-player" id="modalPlayer">
            <video id="modalVideo" controls playsinline></video>
        </div>
        <div class="quality-selector" id="qualitySelector"></div>
        <div class="modal-grid" id="modalDetails"></div>
        <div class="modal-section-title">URLs HLS</div>
        <div class="modal-urls" id="modalUrls"></div>
    </div>
</div>

<div class="toast" id="toast"><span>&#10003;</span><span id="toastText"></span></div>

<script>
    const PAGE_SIZE = 48;
    const PLAY_SVG = '<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
    const COPY_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>';

    let allVideos = [];
    let filtered = [];
    let rendered = 0;
    let currentView = 'grid';
    let activeFilter = 'all';
    let isLoading = false;
    let searchTimeout = null;
    let hlsInstance = null;

    // ─── TOAST ───
    let toastTimer;
    function showToast(msg) {
        clearTimeout(toastTimer);
        document.getElementById('toastText').textContent = msg;
        document.getElementById('toast').classList.add('show');
        toastTimer = setTimeout(function() { document.getElementById('toast').classList.remove('show'); }, 2200);
    }

    function copyText(text, label, el) {
        if (!text) return showToast(label + ' nao disponivel');
        navigator.clipboard.writeText(text).then(function() {
            showToast(label + ' copiado!');
            if (el) { el.classList.add('copied'); setTimeout(function() { el.classList.remove('copied'); }, 1200); }
        });
    }

    // ─── PROGRESS BAR ───
    function showProgress(pct) {
        var bar = document.getElementById('progressBar');
        bar.style.display = 'block';
        bar.style.width = pct + '%';
    }
    function hideProgress() {
        var bar = document.getElementById('progressBar');
        bar.style.width = '100%';
        setTimeout(function() { bar.style.display = 'none'; bar.style.width = '0'; }, 400);
    }

    // ─── FETCH WITH RETRY + LOCAL CACHE ───
    var CACHE_KEY = 'cf_videos_cache';
    var CACHE_MAX_AGE = 5 * 60 * 1000; // 5 minutes

    function getLocalCache() {
        try {
            var raw = localStorage.getItem(CACHE_KEY);
            if (!raw) return null;
            var cached = JSON.parse(raw);
            if (Date.now() - cached.ts < CACHE_MAX_AGE && Array.isArray(cached.videos)) {
                return cached.videos;
            }
        } catch (e) {}
        return null;
    }

    function setLocalCache(videos) {
        try {
            localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), videos: videos }));
        } catch (e) {}
    }

    async function fetchWithRetry(url, maxRetries, baseDelay) {
        var lastError;
        for (var attempt = 0; attempt <= maxRetries; attempt++) {
            try {
                var resp = await fetch(url);
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                return await resp.json();
            } catch (e) {
                lastError = e;
                if (attempt < maxRetries) {
                    var delay = baseDelay * Math.pow(2, attempt);
                    console.log('Retry ' + (attempt + 1) + '/' + maxRetries + ' in ' + delay + 'ms...');
                    await new Promise(function(r) { setTimeout(r, delay); });
                }
            }
        }
        throw lastError;
    }

    async function fetchVideos() {
        if (isLoading) return;
        isLoading = true;

        document.getElementById('skeletonLoader').style.display = 'grid';
        document.getElementById('errorState').style.display = 'none';
        document.getElementById('gridView').innerHTML = '';
        document.getElementById('listBody').innerHTML = '';
        document.getElementById('emptyState').style.display = 'none';
        showProgress(20);

        try {
            showProgress(40);
            var data = await fetchWithRetry('/api/videos', 3, 1000);
            showProgress(90);

            if (data.success) {
                allVideos = Array.isArray(data.videos) ? data.videos : [];
                setLocalCache(allVideos);
                console.log('Videos loaded:', allVideos.length);
            } else {
                throw new Error(data.error || 'API error');
            }
        } catch (e) {
            // Fallback: use local cache if available
            var cached = getLocalCache();
            if (cached && cached.length > 0) {
                allVideos = cached;
                console.log('Using cached videos (' + cached.length + ') after API error:', e.message);
            } else {
                hideProgress();
                document.getElementById('skeletonLoader').style.display = 'none';
                document.getElementById('errorState').style.display = 'flex';
                document.getElementById('errorMsg').textContent = 'Erro: ' + e.message;
                isLoading = false;
                return;
            }
        }

        hideProgress();
        document.getElementById('skeletonLoader').style.display = 'none';
        isLoading = false;
        updateStats();
        updateFilterCounts();
        applyFilters();
    }

    // ─── STATS ───
    function updateStats() {
        if (!Array.isArray(allVideos)) allVideos = [];
        document.getElementById('totalVideos').textContent = allVideos.length.toLocaleString('pt-BR');
        var courses = new Set(allVideos.map(function(v) { return v.course; }).filter(Boolean));
        document.getElementById('totalCourses').textContent = courses.size.toLocaleString('pt-BR');
        document.getElementById('total4K').textContent = allVideos.filter(function(v) { return v.qualities.includes('2160p'); }).length.toLocaleString('pt-BR');
        document.getElementById('total1080').textContent = allVideos.filter(function(v) { return v.qualities.includes('1080p'); }).length.toLocaleString('pt-BR');
    }

    function updateFilterCounts() {
        if (!Array.isArray(allVideos)) allVideos = [];
        document.getElementById('countAll').textContent = allVideos.length.toLocaleString('pt-BR');
        document.getElementById('count4K').textContent = allVideos.filter(function(v) { return v.qualities.includes('2160p'); }).length.toLocaleString('pt-BR');
        document.getElementById('count1080').textContent = allVideos.filter(function(v) { return v.qualities.includes('1080p'); }).length.toLocaleString('pt-BR');
        document.getElementById('count720').textContent = allVideos.filter(function(v) { return v.qualities.includes('720p'); }).length.toLocaleString('pt-BR');
    }

    // ─── FILTERS & SORT ───
    function applyFilters() {
        var q = document.getElementById('searchInput').value.toLowerCase().trim();

        filtered = allVideos.filter(function(v) {
            if (q) {
                var searchable = (v.name + ' ' + v.course + ' ' + v.module + ' ' + v.category).toLowerCase();
                if (!searchable.includes(q)) return false;
            }
            switch (activeFilter) {
                case '4k': return v.qualities.includes('2160p');
                case '1080p': return v.qualities.includes('1080p');
                case '720p': return v.qualities.includes('720p');
                default: return true;
            }
        });

        var sort = document.getElementById('sortSelect').value;
        filtered.sort(function(a, b) {
            switch (sort) {
                case 'name-asc': return a.name.localeCompare(b.name);
                case 'name-desc': return b.name.localeCompare(a.name);
                case 'course-asc': return (a.course + a.name).localeCompare(b.course + b.name);
                case 'course-desc': return (b.course + b.name).localeCompare(a.course + a.name);
                default: return 0;
            }
        });

        var countEl = document.getElementById('searchCount');
        countEl.textContent = q || activeFilter !== 'all'
            ? filtered.length.toLocaleString('pt-BR') + ' resultado' + (filtered.length !== 1 ? 's' : '')
            : '';

        rendered = 0;
        document.getElementById('gridView').innerHTML = '';
        document.getElementById('listBody').innerHTML = '';
        renderBatch();
    }

    // ─── RENDER ───
    function qualityBadges(qualities) {
        return qualities.map(function(q) {
            var cls = q === '2160p' ? 'q-badge-2160p' : q === '1080p' ? 'q-badge-1080p' : 'q-badge-720p';
            var label = q === '2160p' ? '4K' : q;
            return '<span class="q-badge ' + cls + '">' + label + '</span>';
        }).join('');
    }

    function buildPath(v) {
        var parts = [v.course, v.module, v.category].filter(Boolean);
        return parts.join(' <span>&#8250;</span> ');
    }

    function escapeAttr(str) {
        return String(str).replace(/&/g, '&amp;').replace(/'/g, "&#39;").replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function renderBatch() {
        if (rendered >= filtered.length) return;

        var empty = document.getElementById('emptyState');
        if (filtered.length === 0) { empty.style.display = 'block'; return; }
        empty.style.display = 'none';

        var end = Math.min(rendered + PAGE_SIZE, filtered.length);
        var batch = filtered.slice(rendered, end);
        var gridEl = document.getElementById('gridView');
        var listBody = document.getElementById('listBody');

        var gridFragment = document.createDocumentFragment();
        batch.forEach(function(v) {
            var card = document.createElement('div');
            card.className = 'card';
            var bestUrl = v.urls['2160p'] || v.urls['1080p'] || v.urls['720p'] || '';
            card.innerHTML =
                '<div class="card-visual" onclick="openPlayer(\'' + escapeAttr(v.id) + '\')">' +
                    '<div class="card-quality-badges">' + qualityBadges(v.qualities) + '</div>' +
                    '<div class="card-visual-icon">' + PLAY_SVG + '</div>' +
                    (v.category ? '<div class="card-course-tag">' + escapeAttr(v.category) + '</div>' : '') +
                '</div>' +
                '<div class="card-body">' +
                    '<div class="card-title" title="' + escapeAttr(v.name) + '">' + escapeAttr(v.name) + '</div>' +
                    '<div class="card-path">' + buildPath(v) + '</div>' +
                    '<div class="card-actions">' +
                        '<button class="btn-icon" onclick="openPlayer(\'' + escapeAttr(v.id) + '\')" title="Assistir">&#9654; Play</button>' +
                        '<button class="btn-icon" onclick="copyText(\'' + escapeAttr(bestUrl) + '\',\'HLS\',this)" title="Copiar HLS">' + COPY_SVG + ' HLS</button>' +
                        '<button class="btn-icon" onclick="copyText(\'' + escapeAttr(v.id) + '\',\'ID\',this)" title="Copiar ID">' + COPY_SVG + ' ID</button>' +
                    '</div>' +
                '</div>';
            gridFragment.appendChild(card);
        });
        gridEl.appendChild(gridFragment);

        var listFragment = document.createDocumentFragment();
        batch.forEach(function(v) {
            var tr = document.createElement('tr');
            var bestUrl = v.urls['2160p'] || v.urls['1080p'] || v.urls['720p'] || '';
            tr.innerHTML =
                '<td><span class="name-cell" onclick="openPlayer(\'' + escapeAttr(v.id) + '\')" title="' + escapeAttr(v.name) + '">' + escapeAttr(v.name) + '</span></td>' +
                '<td style="font-size:11px;color:var(--text-dim)">' + escapeAttr(v.course) + '</td>' +
                '<td style="font-size:11px;color:var(--text-dim)">' + escapeAttr(v.module) + '</td>' +
                '<td style="font-size:11px;color:var(--text-dim)">' + escapeAttr(v.category) + '</td>' +
                '<td>' + qualityBadges(v.qualities) + '</td>' +
                '<td><div class="list-actions">' +
                    '<button class="btn btn-ghost btn-sm" onclick="openPlayer(\'' + escapeAttr(v.id) + '\')">&#9654; Play</button>' +
                    '<button class="btn btn-ghost btn-sm" onclick="copyText(\'' + escapeAttr(bestUrl) + '\',\'HLS\',this)">HLS</button>' +
                '</div></td>';
            listFragment.appendChild(tr);
        });
        listBody.appendChild(listFragment);

        rendered = end;
        document.getElementById('loadingMore').style.display = rendered < filtered.length ? 'flex' : 'none';
    }

    // ─── INFINITE SCROLL ───
    var observer = new IntersectionObserver(function(entries) {
        if (entries[0].isIntersecting && rendered < filtered.length && !isLoading) { renderBatch(); }
    }, { rootMargin: '400px' });
    observer.observe(document.getElementById('loadSentinel'));

    // ─── VIEW TOGGLE ───
    function setView(v) {
        currentView = v;
        document.getElementById('gridView').classList.toggle('active', v === 'grid');
        document.getElementById('listView').classList.toggle('active', v === 'list');
        document.getElementById('gridViewBtn').classList.toggle('active', v === 'grid');
        document.getElementById('listViewBtn').classList.toggle('active', v === 'list');
    }

    // ─── FILTER CHIPS ───
    document.getElementById('filterChips').addEventListener('click', function(e) {
        var chip = e.target.closest('.chip');
        if (!chip) return;
        document.querySelectorAll('#filterChips .chip').forEach(function(c) { c.classList.remove('active'); });
        chip.classList.add('active');
        activeFilter = chip.dataset.filter;
        applyFilters();
    });

    // ─── HLS PLAYER ───
    function loadHls(url) {
        var video = document.getElementById('modalVideo');
        if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }

        if (Hls.isSupported()) {
            hlsInstance = new Hls();
            hlsInstance.loadSource(url);
            hlsInstance.attachMedia(video);
            hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() { video.play().catch(function() {}); });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
            video.addEventListener('loadedmetadata', function() { video.play().catch(function() {}); }, { once: true });
        } else {
            showToast('Seu navegador nao suporta HLS');
        }
    }

    function openPlayer(videoId) {
        var v = allVideos.find(function(x) { return x.id === videoId; });
        if (!v) return;

        document.getElementById('modalTitle').textContent = v.name;

        // Quality selector
        var selectorEl = document.getElementById('qualitySelector');
        var defaultQuality = v.qualities[v.qualities.length - 1];
        var selectorHtml = '<span class="qs-label">Qualidade:</span>';
        v.qualities.forEach(function(q) {
            var label = q === '2160p' ? '4K (2160p)' : q;
            var isActive = q === defaultQuality ? ' active' : '';
            var qClass = q === '2160p' ? ' q-2160p' : '';
            selectorHtml += '<button class="quality-btn' + qClass + isActive + '" data-quality="' + q + '" onclick="switchQuality(\'' + escapeAttr(videoId) + '\',\'' + q + '\',this)">' + label + '</button>';
        });
        selectorEl.innerHTML = selectorHtml;

        loadHls(v.urls[defaultQuality]);

        // Details
        document.getElementById('modalDetails').innerHTML =
            '<div class="detail-item"><div class="detail-label">Curso</div><div class="detail-value">' + escapeAttr(v.course || '--') + '</div></div>' +
            '<div class="detail-item"><div class="detail-label">Módulo</div><div class="detail-value">' + escapeAttr(v.module || '--') + '</div></div>' +
            '<div class="detail-item"><div class="detail-label">Categoria</div><div class="detail-value">' + escapeAttr(v.category || '--') + '</div></div>' +
            '<div class="detail-item"><div class="detail-label">Qualidades</div><div class="detail-value">' + v.qualities.join(', ') + '</div></div>';

        // URLs
        var urlsHtml = '';
        v.qualities.forEach(function(q) {
            var label = q === '2160p' ? '4K' : q;
            urlsHtml +=
                '<div class="url-row">' +
                    '<span class="url-label">' + label + '</span>' +
                    '<span class="url-value" title="' + escapeAttr(v.urls[q]) + '">' + escapeAttr(v.urls[q]) + '</span>' +
                    '<button class="btn btn-ghost btn-sm" onclick="copyText(\'' + escapeAttr(v.urls[q]) + '\',\'' + label + ' HLS\')">Copiar</button>' +
                '</div>';
        });
        document.getElementById('modalUrls').innerHTML = urlsHtml;

        document.getElementById('playerModal').classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function switchQuality(videoId, quality, btn) {
        var v = allVideos.find(function(x) { return x.id === videoId; });
        if (!v || !v.urls[quality]) return;

        var video = document.getElementById('modalVideo');
        var currentTime = video.currentTime;

        document.querySelectorAll('.quality-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');

        if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }

        if (Hls.isSupported()) {
            hlsInstance = new Hls();
            hlsInstance.loadSource(v.urls[quality]);
            hlsInstance.attachMedia(video);
            hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() {
                video.currentTime = currentTime;
                video.play().catch(function() {});
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = v.urls[quality];
            video.addEventListener('loadedmetadata', function() {
                video.currentTime = currentTime;
                video.play().catch(function() {});
            }, { once: true });
        }

        showToast('Qualidade: ' + (quality === '2160p' ? '4K' : quality));
    }

    function closeModal() {
        var video = document.getElementById('modalVideo');
        video.pause();
        video.removeAttribute('src');
        if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
        document.getElementById('playerModal').classList.remove('active');
        document.body.style.overflow = '';
    }

    document.getElementById('playerModal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

    // ─── EVENTS ───
    document.getElementById('searchInput').addEventListener('input', function() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(applyFilters, 250);
    });
    document.getElementById('sortSelect').addEventListener('change', applyFilters);

    document.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
            e.preventDefault();
            document.getElementById('searchInput').focus();
        }
    });

    // ─── INIT ───
    fetchVideos();
</script>
</body>
</html>
